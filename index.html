<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="canonical" href="https://colors.jeme.app/">
    <title>Colors | A Minute-by-Minute Hex Color Clock</title>
    <meta name="description" content="Colors is a color clock that changes the page background once every minute, moving through every hex color from #000000 to #FFFFFF over 32 years.">
    <meta name="keywords" content="colors, color clock, hex colors, background colors, web experiment, generative color, color timeline, Eemeli Mark">
    <meta name="author" content="Eemeli Mark">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#000000">
    <meta name="application-name" content="Colors">
    <meta name="apple-mobile-web-app-title" content="Colors">
    <meta property="og:site_name" content="Colors">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://colors.jeme.app/">
    <meta property="og:title" content="Colors | A Minute-by-Minute Hex Color Clock">
    <meta property="og:description" content="Colors is a color clock that changes the page background once every minute, moving through every hex color from #000000 to #FFFFFF over 32 years.">
    <meta property="og:image" content="https://colors.jeme.app/og-image.png">
    <meta property="og:image:secure_url" content="https://colors.jeme.app/og-image.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Colors preview showing a hex color range from #000000 to #FFFFFF">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Colors | A Minute-by-Minute Hex Color Clock">
    <meta name="twitter:description" content="Colors is a color clock that changes the page background once every minute, moving through every hex color from #000000 to #FFFFFF over 32 years.">
    <meta name="twitter:image" content="https://colors.jeme.app/og-image.png">
    <meta name="twitter:image:alt" content="Colors preview showing a hex color range from #000000 to #FFFFFF">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background-color: #000;
            color: white;
            font-family: monospace, 'Courier New', Courier;
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            transition: background-color 0.4s ease;
        }

        h1 {
            font-size: clamp(3rem, 14vw, 4.8rem);
            line-height: 1;
        }

        h2 {
            margin-top: 8px;
        }

        main {
            width: min(92vw, 520px);
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            background-color: black;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.22);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .info-p {
            padding: 4px;
            font-size: 0.9em;
        }

        .progress {
            height: 8px;
            margin: 10px 4px 8px;
            overflow: hidden;
            border-radius: 999px;
            background: #222;
        }

        #cycleProgressBar {
            width: 0%;
            height: 100%;
            background: white;
        }

        #infoButton {
            padding: 7px 10px;
            border-radius: 10px;
            background-color: black;
            cursor: pointer;
            position: absolute;
            bottom: 6px;
            left: 6px;
            color: white;
        }

        a {
            padding: 7px 10px;
            border-radius: 10px;
            background-color: black;
            text-decoration: none;
            position: absolute;
            bottom: 6px;
            right: 6px;
            color: white;
        }
    </style>
</head>

<body>
    <main>
        <h1 id="currentColor"></h1>
        <h2 id="nextColorIn"></h2>
        <div id="infoArea">
            <p class="info-p">Colors shown: <span id="colorsDone"></span></p>
            <p class="info-p">Colors remaining: <span id="colorsLeft"></span></p>
            <p class="info-p">Cycle progress: <span id="cycleProgress"></span></p>
            <div class="progress" aria-hidden="true">
                <div id="cycleProgressBar"></div>
            </div>
            <p class="info-p">Total colors: 16,777,216</p>
            <p class="info-p">Color changes every minute from #000000 to #FFFFFF</p>
            <p class="info-p">Started: <span id="startDate"></span></p>
            <p class="info-p">Cycle complete: <span id="cycleComplete"></span></p>
        </div>
    </main>
    <p id="infoButton">Info</p>
    <a href="https://eemelimark.com/" rel="author">Made by Eemeli Mark</a>
    <script>
        const TOTAL_COLORS = 0x1000000;
        const LAST_COLOR_INDEX = TOTAL_COLORS - 1;
        const MINUTE_MS = 60 * 1000;
        const START_TIME_UTC = Date.UTC(2023, 7, 1, 0, 0, 0);
        const COMPLETE_TIME_UTC = START_TIME_UTC + (TOTAL_COLORS * MINUTE_MS);

        const numberFormatter = new Intl.NumberFormat('en-US');
        const dateFormatter = new Intl.DateTimeFormat('en-US', {
            year: 'numeric',
            month: 'long',
            day: 'numeric',
            hour: 'numeric',
            minute: '2-digit',
            timeZoneName: 'short'
        });

        const currentColor = document.getElementById('currentColor');
        const nextColorIn = document.getElementById('nextColorIn');
        const colorsDone = document.getElementById('colorsDone');
        const colorsLeft = document.getElementById('colorsLeft');
        const cycleProgress = document.getElementById('cycleProgress');
        const cycleProgressBar = document.getElementById('cycleProgressBar');
        const startDate = document.getElementById('startDate');
        const cycleComplete = document.getElementById('cycleComplete');
        const infoButton = document.getElementById('infoButton');
        const infoArea = document.getElementById('infoArea');
        infoArea.style.display = 'none';

        function clamp(number, min, max) {
            return Math.min(Math.max(number, min), max);
        }

        function colorIndexFromTime(now) {
            const elapsedMinutes = Math.floor((now - START_TIME_UTC) / MINUTE_MS);
            return clamp(elapsedMinutes, 0, LAST_COLOR_INDEX);
        }

        function convertToHexColor(base10Number) {
            return '#' + clamp(base10Number, 0, LAST_COLOR_INDEX).toString(16).padStart(6, '0').toUpperCase();
        }

        function updateClock() {
            const now = Date.now();
            const colorIndex = colorIndexFromTime(now);
            const currentHex = convertToHexColor(colorIndex);
            const cycleProgressPercent = ((colorIndex + 1) / TOTAL_COLORS) * 100;
            const currentColorStart = START_TIME_UTC + (colorIndex * MINUTE_MS);
            const secondsUntilNext = now >= COMPLETE_TIME_UTC ? 0 : Math.max(1, Math.ceil((MINUTE_MS - (now - currentColorStart)) / 1000));

            document.body.style.backgroundColor = currentHex;
            document.querySelector('meta[name="theme-color"]').setAttribute('content', currentHex);
            currentColor.textContent = currentHex;
            nextColorIn.textContent = colorIndex === LAST_COLOR_INDEX ? '--' : `${secondsUntilNext}s`;
            colorsDone.textContent = numberFormatter.format(colorIndex + 1);
            colorsLeft.textContent = numberFormatter.format(LAST_COLOR_INDEX - colorIndex);
            cycleProgress.textContent = `${cycleProgressPercent.toFixed(2)}%`;
            cycleProgressBar.style.width = `${cycleProgressPercent}%`;
        }

        infoButton.addEventListener('click', () => {
            infoArea.style.display = infoArea.style.display === 'none' ? 'block' : 'none';
        });

        startDate.textContent = dateFormatter.format(new Date(START_TIME_UTC));
        cycleComplete.textContent = dateFormatter.format(new Date(COMPLETE_TIME_UTC));

        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>

</html>
